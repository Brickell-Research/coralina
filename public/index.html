<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coralina Jewelry Co. — Handmade Coastal Jewelry</title>
    <meta
      name="description"
      content="Coralina Jewelry Co. — caribbean roots × gulf coast, handmade with coastal magic."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Jost:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1b3a8b;
        --ink-hover: #122a66;
        --muted: #5a6b8c;
        --canvas: #fbfdfe;
        --coral-teal: #8fd3d0;
        --coral-blush: #f4c9cb;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Jost", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 400;
        color: var(--ink);
        line-height: 1.55;
        background: var(--canvas);
        background-image:
          radial-gradient(
            ellipse at 18% 82%,
            rgba(143, 211, 208, 0.28) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 82% 78%,
            rgba(244, 201, 203, 0.28) 0%,
            transparent 60%
          );
        background-attachment: fixed;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        padding: 24px;
      }

      .site-header {
        display: flex;
        justify-content: flex-start;
      }

      .badge {
        display: inline-block;
        width: 56px;
        height: 56px;
        line-height: 0;
      }

      .badge img {
        width: 100%;
        height: 100%;
        display: block;
      }

      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: clamp(16px, 3vw, 28px);
        padding: clamp(16px, 4vw, 48px) 0;
      }

      .hero-mark {
        margin: 0;
        width: min(70vw, 380px);
        line-height: 0;
      }

      .hero-mark img {
        width: 100%;
        height: auto;
        display: block;
      }

      .motto {
        font-family: "Parisienne", "Apple Chancery", cursive;
        font-weight: 400;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 1.15;
        letter-spacing: 0.005em;
        color: var(--ink);
        margin: 0;
        max-width: 18ch;
        text-wrap: balance;
      }

      .site-footer {
        display: flex;
        justify-content: center;
        color: var(--muted);
      }

      .site-footer small {
        font-family: "Jost", sans-serif;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.72rem;
      }

      @media (min-width: 720px) {
        body {
          padding: 40px 64px;
        }

        .badge {
          width: 72px;
          height: 72px;
        }

        .hero-mark {
          width: min(46vw, 460px);
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .hero-mark,
        .motto {
          animation: rise 700ms ease-out both;
        }

        .motto {
          animation-delay: 120ms;
        }

        @keyframes rise {
          from {
            opacity: 0;
            transform: translateY(8px);
          }
          to {
            opacity: 1;
            transform: none;
          }
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a href="/" class="badge" aria-label="Coralina Jewelry Co. home">
        <img
          src="/logo-badge.png"
          alt="Circular Coralina Jewelry Co. badge with navy lettering above teal and blush watercolor corals and a small clownfish."
        />
      </a>
    </header>

    <main class="hero">
      <figure class="hero-mark">
        <img
          src="/logo.png"
          alt="Coralina Jewelry Co. wordmark in navy script over a soft watercolor coral branch with a small orange clownfish tucked inside."
        />
      </figure>

      <h1 class="motto">
        caribbean roots &times; gulf coast &mdash; handmade with coastal magic
      </h1>
    </main>

    <footer class="site-footer">
      <small>&copy; 2026 Coralina Jewelry Co.</small>
    </footer>
  </body>
</html>
