<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coralina Jewelry Co. — Handmade Coastal Jewelry</title>
    <meta
      name="description"
      content="Coralina Jewelry Co. — ocean-inspired jewelry. Caribbean roots × gulf coast, handmade with coastal magic."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Jost:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1b3a8b;
        --muted: #5a6b8c;
        --canvas: #fbfdfe;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Jost", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 400;
        color: var(--ink);
        line-height: 1.55;
        background: var(--canvas);
        background-image:
          radial-gradient(
            ellipse at 18% 82%,
            rgba(143, 211, 208, 0.28) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 82% 78%,
            rgba(244, 201, 203, 0.28) 0%,
            transparent 60%
          );
        background-attachment: fixed;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        padding: 24px;
      }

      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: clamp(20px, 4vw, 36px);
        padding: clamp(16px, 4vw, 48px) 0;
      }

      .hero-mark {
        margin: 0;
        width: min(70vw, 320px);
        line-height: 0;
      }

      .hero-mark img {
        width: 100%;
        height: auto;
        display: block;
      }

      .motto {
        font-family: "Parisienne", "Apple Chancery", cursive;
        font-weight: 400;
        font-size: clamp(1.6rem, 5.5vw, 3.25rem);
        line-height: 1.3;
        letter-spacing: 0.005em;
        color: var(--ink);
        margin: 0;
      }

      .motto span {
        display: block;
      }

      .site-footer {
        display: flex;
        justify-content: center;
        color: var(--muted);
      }

      .site-footer small {
        font-family: "Jost", sans-serif;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 0.72rem;
      }

      @media (min-width: 720px) {
        body {
          padding: 40px 64px;
        }

        .hero-mark {
          width: min(40vw, 380px);
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .hero-mark,
        .motto {
          animation: rise 700ms ease-out both;
        }

        .motto {
          animation-delay: 120ms;
        }

        @keyframes rise {
          from {
            opacity: 0;
            transform: translateY(8px);
          }
          to {
            opacity: 1;
            transform: none;
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <figure class="hero-mark">
        <img
          src="/logo-badge.png"
          alt="Circular Coralina Jewelry Co. badge with navy lettering above teal and blush watercolor corals and a small clownfish."
        />
      </figure>

      <h1 class="motto">
        <span>ocean-inspired jewelry 🌊</span>
        <span>caribbean roots &times; gulf coast</span>
        <span>handmade with coastal magic</span>
      </h1>
    </main>

    <footer class="site-footer">
      <small>&copy; 2026 Coralina Jewelry Co.</small>
    </footer>
  </body>
</html>
