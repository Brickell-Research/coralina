name: ci

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'public/**'
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28.5'
          gleam-version: '1.16.0'

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.cache/gleam
          key: ${{ runner.os }}-gleam-${{ hashFiles('manifest.toml') }}
          restore-keys: ${{ runner.os }}-gleam-

      - run: gleam format --check
      - run: gleam deps download
      - run: gleam check
      - run: gleam build --warnings-as-errors
      - run: gleam test
